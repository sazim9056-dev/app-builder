name: Universal App Builder

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'App description (any type)'
        required: true
        type: string
      session_id:
        description: 'Session ID'
        required: true
        type: string
      previous_code:
        description: 'Previous code'
        required: false
        type: string
      conversation_history:
        description: 'Conversation history'
        required: false
        type: string
      complexity:
        description: 'App complexity'
        required: false
        type: choice
        default: 'production'
        options:
          - simple
          - medium
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install groq

      - name: Generate ANY App
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_PROMPT: ${{ inputs.prompt }}
          PREVIOUS_CODE: ${{ inputs.previous_code }}
          CONVERSATION_HISTORY: ${{ inputs.conversation_history }}
          SESSION_ID: ${{ inputs.session_id }}
          APP_COMPLEXITY: ${{ inputs.complexity }}
        run: python scripts/generate_code.py

      - name: Fix Android SDK versions
        run: |
          if [ -f generated_app/android/app/build.gradle ]; then
            cd generated_app/android/app
            sed -i 's/minSdkVersion .*/minSdkVersion 21/' build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' build.gradle
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' build.gradle
          fi

      - name: Get Flutter dependencies
        run: |
          cd generated_app
          flutter pub get

      - name: Build APK
        run: |
          cd generated_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.session_id }}
          path: generated_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1

      - name: Upload Source Code
        uses: actions/upload-artifact@v4
        with:
          name: source-${{ inputs.session_id }}
          path: generated_app/lib/
          retention-days: 7
