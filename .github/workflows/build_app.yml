name: Build AI Flutter App

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'App ka description'
        required: true
      session_id:
        description: 'Session ID'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install requests

      - name: Generate Code via Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_PROMPT: ${{ github.event.inputs.prompt }}
          SESSION_ID: ${{ github.event.inputs.session_id }}
        run: python generate_code.py  # <--- Sahi path (root)

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5' # Tumhara naya version
          channel: 'stable'

      - name: Replace main.dart
        run: |
          mv main.dart lib/main.dart

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release-${{ github.event.inputs.session_id }}
          path: build/app/outputs/flutter-apk/app-debug.apk
