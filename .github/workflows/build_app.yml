name: Build Flutter App

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'App description prompt'
        required: true
        type: string
      session_id:
        description: 'Unique session ID for this build'
        required: true
        type: string
      previous_code:
        description: 'Previous code to modify (empty for new app)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install groq

      - name: Generate Flutter code
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_PROMPT: ${{ inputs.prompt }}
          PREVIOUS_CODE: ${{ inputs.previous_code }}
          SESSION_ID: ${{ inputs.session_id }}
        run: python scripts/generate_code.py

      - name: Fix Android SDK versions
        run: |
          cd generated_app/android/app
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' build.gradle

      - name: Build Web (for preview)
        run: |
          cd generated_app
          flutter build web --release --base-href /

      - name: Build APK
        run: |
          cd generated_app
          flutter build apk --debug

      - name: Save generated code
        run: |
          cp generated_app/lib/main.dart generated_code.dart

      - name: Upload Web Preview
        uses: actions/upload-artifact@v4
        with:
          name: web-preview-${{ inputs.session_id }}
          path: generated_app/build/web/
          retention-days: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.session_id }}
          path: generated_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1

      - name: Upload Source Code
        uses: actions/upload-artifact@v4
        with:
          name: source-${{ inputs.session_id }}
          path: generated_code.dart
          retention-days: 1
